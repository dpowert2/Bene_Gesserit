#   institutional_vocabulary  How analysts, press, and VCs describe this space
#   founder_vocabulary        How founders describe this BEFORE they have press coverage
#                             (Product Hunt pitch, Show HN title, GitHub repo description)
#   technical_vocabulary      Terms found in GitHub repos, npm/pypi packages, API docs
