global_config:

  # Stage qualifiers appended to Layer 1 queries
  stage_qualifiers:
    - "seed startup"
    - "pre-seed"
    - "Series A"
    - "YC"
    - "EF cohort"
    - "Antler"

  # Geographic qualifiers appended to Europe-first queries
  geo_qualifiers_eu:
    - "Europe"
    - "UK startup"
    - "London"
    - "Berlin"
    - "Paris"
    - "Amsterdam"
    - "Dublin"
    - "Barcelona"

  # Accelerator sources for Layer 4 sweeps (run as batch, not inline)
  accelerator_sources:
    - name: "YC current batch"
      url: "https://www.ycombinator.com/companies"
      filter_tags: ["fintech", "finance", "AI"]
    - name: "EF current cohort"
      url: "https://www.joinef.com/companies"
    - name: "Antler portfolio"
      url: "https://www.antler.co/portfolio"
    - name: "Mouro Capital portfolio"
      url: "https://www.mourocapital.com/portfolio"
    - name: "Plug and Play Fintech"
      url: "https://www.plugandplaytechcenter.com"

  # Product launch sources for Layer 2 queries
  layer2_sources:
    - "site:producthunt.com"
    - "site:news.ycombinator.com 'Show HN'"

  # Technical artifact sources for Layer 3 queries
  layer3_sources:
    - "site:github.com"

  # Hard crypto exclusion terms (appended when gap has crypto_exclusion: true)
  crypto_exclusion_terms: "-crypto -DeFi -blockchain -web3 -NFT -token"

  # Global novelty antipatterns — reject ANY query result matching these
  global_novelty_antipatterns:
    - "operating system for"
    - "workflow management for"
    - "AI-assisted SaaS"
    - "advisor OS"
    - "family office OS"
    - "broker OS"

  # Global hard filter — internal workflow tools
